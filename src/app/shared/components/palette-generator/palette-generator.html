<div class="palette-generator-wrapper">
  <div class="step step-1">
    <span class="txt-h6 step-title">1. Base Color</span>
    <shared-color-picker
      (colorChange)="onColorChange($event)"></shared-color-picker>
  </div>

  <p-divider />

  <div class=" step step-2">
    <span class="txt-h6 step-title">2. Color Scheme</span>
    <shared-scheme-selector
      (schemeChange)="onSchemeChange($event)"></shared-scheme-selector>
  </div>

  <p-divider />

  <div class=" step step-3">
    <span class="txt-h6 step-title">3. Variation Level</span>
    <shared-palette-options class="option-slider"
      (variationChange)="onVariationChange($event)"></shared-palette-options>
  </div>

  <p-divider />

  <div class=" step step-4">
    <span class="txt-h6 step-title">4. Actions</span>

    <div class="actions-container">
      <p-button
        label="Generate palette"
        icon="pi pi-palette"
        severity="primary"
        (onClick)="onGeneratePalette()">
      </p-button>

      <p-button
        label="Clear options"
        icon="pi pi-trash"
        outlined
        severity="primary"
        (onClick)="onGeneratePalette()">
      </p-button>
    </div>

  </div>

</div>
